# fly.toml — generated for Camp Hub
# Run `fly launch` to set the app name and region, then `fly deploy`

[build]

[env]
  DB_PATH = "/data/camp_manager.db"
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[mounts]]
  source = "camp_data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
